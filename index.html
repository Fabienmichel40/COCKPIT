<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Cockpit">
<meta name="theme-color" content="#ffffff">
<title>Cockpit</title>
<style>
:root{color-scheme:light;--blue:#2a78d6;--bg:#fff;--soft:#f5f5f3;--line:#ececE8;--ink:#1a1a18;--mut:#86857d}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:16px;line-height:1.45;padding-bottom:150px}
.wrap{max-width:580px;margin:0 auto;padding:14px 14px 0}
.head{display:flex;justify-content:space-between;align-items:baseline}
.head h1{font-size:20px;font-weight:700;margin:0}
.count{color:var(--mut);font-size:13px}
.clear{font-size:13px;color:var(--blue);background:none;border:none;padding:0;cursor:pointer}
.brief{background:var(--soft);border-radius:14px;padding:12px 14px;margin:12px 0}
.brief h3{margin:0 0 6px;font-size:13px;text-transform:uppercase;letter-spacing:.04em;color:var(--mut)}
.brief .p{font-size:14px;margin:3px 0}.brief .p b{color:var(--blue)}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin:10px 0}
.chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:6px 12px;font-size:13px;cursor:pointer;user-select:none}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.chip.proj.on{background:var(--blue);border-color:var(--blue)}
.dim{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--mut);margin:8px 2px 2px}
.list{margin-top:8px}
.item{display:flex;align-items:flex-start;gap:11px;padding:12px 6px;border-top:1px solid var(--line)}
.item:first-child{border-top:none}
.box{width:20px;height:20px;border:2px solid #cfcec7;border-radius:6px;flex:none;margin-top:1px;cursor:pointer}
.item.done .box{background:var(--blue);border-color:var(--blue)}
.item.done .txt{text-decoration:line-through;color:var(--mut)}
.txt{flex:1;min-width:0}.txt .l{font-weight:500}.txt .m{font-size:12px;color:var(--mut);margin-top:2px}
.tag{font-size:11px;color:var(--mut)}
.empty{color:var(--mut);padding:22px 6px;text-align:center;font-size:14px}
.lane{margin:14px 0 0}
.lane-h{display:flex;align-items:baseline;gap:8px;margin-bottom:4px}
.lane-h .t{font-weight:700;font-size:15px}
.lane-h .c{font-size:12px;color:#fff;background:var(--blue);border-radius:999px;padding:1px 8px}
.lane-h .c.zero{background:#cfcec7}
.li{padding:7px 4px;border-top:1px solid var(--line);font-size:14.5px}
.li:first-child{border-top:none}
.li .s{font-size:11px;color:var(--mut)}
.pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.pill{font-size:12px;background:var(--soft);border-radius:999px;padding:4px 10px}
.cap{position:fixed;left:0;right:0;bottom:58px;background:#fff;border-top:1px solid var(--line);padding:8px 12px}
.cap form{max-width:580px;margin:0 auto;display:flex;gap:8px}
.cap input{flex:1;border:1px solid var(--line);border-radius:12px;padding:11px 12px;font-size:16px;background:var(--soft)}
.cap button{border:none;background:var(--blue);color:#fff;border-radius:12px;padding:0 16px;font-size:18px;font-weight:600;cursor:pointer}
.nav{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);display:flex}
.nav button{flex:1;background:none;border:none;padding:9px 0 14px;font-size:12px;color:var(--mut);cursor:pointer}
.nav button.on{color:var(--blue);font-weight:600}
.nav .ic{display:block;font-size:18px;margin-bottom:2px}
.ver{color:#b9b8b1;font-size:11px;text-align:center;margin:18px 0 6px}

.proj-card{display:flex;gap:10px;padding:9px 4px;border-top:1px solid var(--line);align-items:flex-start}
.proj-card:first-child{border-top:none}
.badge{width:30px;height:30px;border-radius:8px;color:#fff;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;flex:none}
.pc-body{flex:1;min-width:0}.pc-nom{font-weight:600;font-size:14.5px}
.ptask{font-size:12.5px;color:var(--mut);margin-top:2px}.ptask.s{font-style:italic;opacity:.8}
.lane-h .ic{font-size:15px;margin-right:2px}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <h1 id="vtitle">Aujourd'hui</h1>
    <span><span class="count" id="count"></span> &nbsp;<button class="clear" id="clear" style="display:none">effacer</button></span>
  </div>

  <div class="brief" id="brief"><h3>Point du matin</h3><div id="briefBody"><div class="p">…</div></div></div>

  <div id="filters">
    <div class="dim">Type</div><div class="chips" id="typeChips"></div>
    <div class="dim">Projet</div><div class="chips" id="projChips"></div>
  </div>
  <div class="list" id="list"></div>

  <div id="horizon" style="display:none"></div>

  <div class="ver" id="ver"></div>
</div>

<div class="cap"><form id="capForm" autocomplete="off"><input id="capInput" placeholder="note une idée…"><button type="submit">+</button></form></div>

<div class="nav">
  <button data-v="today" class="on"><span class="ic">◷</span>Aujourd'hui</button>
  <button data-v="horizon"><span class="ic">▦</span>Horizon</button>
  <button data-v="brain"><span class="ic">＊</span>Pense-bête</button>
</div>

const store={load(){try{return JSON.parse(localStorage.getItem('cockpit_items'))||null}catch(e){return null}},save(v){localStorage.setItem('cockpit_items',JSON.stringify(v))}};
let items=store.load(); if(!items){items=SEED.map((x,i)=>({id:Date.now()+i,...x}));store.save(items);}
let DATA=DEFAULT_DATA;
let view='today',fType=new Set(),fProj=new Set();
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

function renderChips(){
  document.getElementById('typeChips').innerHTML=TYPES.map(t=>'<span class="chip type'+(fType.has(t)?' on':'')+'" data-t="'+t+'">'+t+'</span>').join('');
  document.getElementById('projChips').innerHTML=PROJETS.map(p=>'<span class="chip proj'+(fProj.has(p)?' on':'')+'" data-p="'+p+'">'+p+'</span>').join('');
}
function match(it){return (fType.size===0||fType.has(it.t))&&(fProj.size===0||(it.p&&fProj.has(it.p)));}

function render(){
  document.getElementById('vtitle').textContent=view==='today'?"Aujourd'hui":view==='horizon'?'Horizon':'Pense-bête';
  document.getElementById('brief').style.display=view==='today'?'block':'none';
  document.getElementById('filters').style.display=view==='today'?'block':'none';
  document.getElementById('list').style.display=view==='today'||view==='brain'?'block':'none';
  document.getElementById('horizon').style.display=view==='horizon'?'block':'none';
  if(view==='horizon'){renderHorizon();document.getElementById('count').textContent='';document.getElementById('clear').style.display='none';return;}
  let pool=items.slice();
  if(view==='brain')pool=pool.filter(i=>i.t==='Pense-bête'); else pool=pool.filter(i=>i.t!=='Pense-bête').filter(match);
  pool.sort((a,b)=>a.done-b.done);
  document.getElementById('list').innerHTML=pool.length?pool.map(it=>'<div class="item'+(it.done?' done':'')+'" data-id="'+it.id+'"><div class="box"></div><div class="txt"><div class="l">'+esc(it.l)+'</div><div class="m"><span class="tag">'+it.t+(it.p?' · '+it.p:'')+'</span></div></div></div>').join(''):'<div class="empty">Rien ici. Capture une idée en bas.</div>';
  const n=document.getElementById('list').querySelectorAll('.item').length;
  document.getElementById('count').textContent=n+' élément'+(n>1?'s':'');
  document.getElementById('clear').style.display=(fType.size||fProj.size)?'inline':'none';
}

function lane(title,arr,opt){
  arr=arr||[]; const z=arr.length===0?' zero':'';
  let h='<div class="lane"><div class="lane-h"><span class="t">'+esc(title)+'</span><span class="c'+z+'">'+arr.length+'</span></div>';
  if(opt==='pills'){ h+='<div class="pills">'+arr.map(x=>'<span class="pill">'+esc(x)+'</span>').join('')+'</div>'; }
  else { h+= arr.length? arr.map(x=>'<div class="li">'+esc(x)+'</div>').join('') : '<div class="li s">—</div>'; }
  return h+'</div>';
}
function colorFor(s){s=s||'';let h=0;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))%360;return 'hsl('+h+',52%,52%)';}
function laneProjects(title,icon,arr){
  arr=arr||[];const z=arr.length?'':' zero';
  let h='<div class="lane"><div class="lane-h"><span class="t"><span class="ic">'+icon+'</span>'+esc(title)+'</span><span class="c'+z+'">'+arr.length+'</span></div>';
  h+=arr.map(p=>{const nom=esc(p.nom||p);const ini=((p.nom||p).trim()[0]||'?').toUpperCase();
    let c='<div class="proj-card"><div class="badge" style="background:'+colorFor(p.nom||p)+'">'+ini+'</div><div class="pc-body"><div class="pc-nom">'+nom+'</div>';
    const tk=(p.taches||[]);
    c+= tk.length? tk.map(x=>'<div class="ptask">→ '+esc(x)+'</div>').join('') : '<div class="ptask s">pas de prochaine action</div>';
    return c+'</div></div>';}).join('');
  return h+'</div>';
}
function renderHorizon(){
  const d=DATA||{};let h='';
  h+=lane('\u{1F3AF} Responsabilités',d.responsabilites,'pills');
  h+=laneProjects('Projets pro','\u{1F4CB}',d.projets_pro);
  h+=laneProjects('Projets perso','\u{1F4C1}',d.projets_perso);
  h+=lane('\u{1F4D6} À lire',d.a_lire);
  h+=lane('\u{25B6}\u{FE0F} À voir',d.a_voir);
  h+=lane('\u{1F393} Formations en cours',d.formations);
  h+=lane('\u{23F3} En attente',d.en_attente);
  document.getElementById('horizon').innerHTML=h;
}
function renderBrief(){
  const d=DATA||{}; const el=document.getElementById('briefBody'); let h='';
  if(d.date)h+='<div class="p" style="color:#86857d">'+esc(d.date)+'</div>';
  (d.priorites||[]).forEach(p=>h+='<div class="p"><b>•</b> '+esc(p)+'</div>');
  if(d.agenda&&d.agenda.length){h+='<div class="p" style="margin-top:6px;color:#86857d">'+d.agenda.length+" RDV aujourd'hui</div>";d.agenda.slice(0,4).forEach(x=>h+='<div class="p"><b>'+esc(x.t||'')+' </b>'+esc(x.titre||'')+'</div>');}
  el.innerHTML=h||'<div class="p" style="color:#86857d">Brief alimenté par Claude (cockpit-data.json).</div>';
}

document.getElementById('typeChips').addEventListener('click',e=>{const t=e.target.dataset.t;if(!t)return;fType.has(t)?fType.delete(t):fType.add(t);renderChips();render();});
document.getElementById('projChips').addEventListener('click',e=>{const p=e.target.dataset.p;if(!p)return;fProj.has(p)?fProj.delete(p):fProj.add(p);renderChips();render();});
document.getElementById('clear').addEventListener('click',()=>{fType.clear();fProj.clear();renderChips();render();});
document.getElementById('list').addEventListener('click',e=>{const it=e.target.closest('.item');if(!it)return;const o=items.find(x=>x.id===Number(it.dataset.id));if(o){o.done=!o.done;store.save(items);render();}});
document.querySelector('.nav').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;view=b.dataset.v;document.querySelectorAll('.nav button').forEach(x=>x.classList.toggle('on',x===b));render();});
document.getElementById('capForm').addEventListener('submit',e=>{e.preventDefault();const v=document.getElementById('capInput').value.trim();if(!v)return;items.unshift({id:Date.now(),t:'Pense-bête',p:'',l:v,done:false});store.save(items);document.getElementById('capInput').value='';render();});

async function loadData(){
  try{const r=await fetch('./cockpit-data.json',{cache:'no-store'});if(r.ok)DATA=await r.json();}catch(e){}
  renderBrief(); if(view==='horizon')renderHorizon();
}
document.getElementById('ver').textContent='Cockpit '+VERSION;
renderChips(); render(); renderBrief(); loadData();
</script>
</body>
</html>
