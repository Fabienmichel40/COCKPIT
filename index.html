<style>
:root{
  --bg:#f1efe8; --surface:#ffffff; --card:#faf9f5; --text:#26251f; --muted:#6b6a63; --faint:#9a988f;
  --border:#e3e1d8; --strong:#cbc9be;
  --blue-bg:#e6f1fb; --blue-tx:#185fa5;
  --amber-bg:#faeeda; --amber-tx:#854f0b;
  --green-bg:#eaf3de; --green-tx:#3b6d11;
  --purple-bg:#eeedfe; --purple-tx:#534ab7;
  --teal-bg:#e1f5ee; --teal-tx:#0f6e56;
  --red-bg:#fcebeb; --red-tx:#a32d2d;
  --done:#1d9e75;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#1a1a17; --surface:#26251f; --card:#2f2e27; --text:#ece9e0; --muted:#a9a79d; --faint:#7a786f;
    --border:#3a3930; --strong:#4a493e;
    --blue-bg:#0c447c; --blue-tx:#b5d4f4;
    --amber-bg:#633806; --amber-tx:#fac775;
    --green-bg:#27500a; --green-tx:#c0dd97;
    --purple-bg:#3c3489; --purple-tx:#cecbf6;
    --teal-bg:#085041; --teal-tx:#9fe1cb;
    --red-bg:#501313; --red-tx:#f7c1c1;
    --done:#1d9e75;
  }
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
body{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding-top:env(safe-area-inset-top);}
header{padding:14px 18px 4px;position:relative;}
h1{margin:0;font-size:24px;font-weight:600;}
.count{margin:2px 0 0;font-size:13px;color:var(--faint);}
.reset{font-size:13px;color:var(--blue-tx);cursor:pointer;margin-left:10px;}
.addtop{position:absolute;top:12px;right:16px;width:40px;height:40px;border-radius:50%;border:none;background:var(--blue-tx);color:#fff;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.15);}
.spherebar{display:flex;gap:6px;padding:10px 18px 2px;}
.sphere{flex:1;text-align:center;font-size:13px;padding:7px 0;border-radius:10px;border:1px solid var(--strong);background:var(--surface);color:var(--muted);cursor:pointer;}
.sphere.on{background:var(--text);color:var(--surface);border-color:var(--text);font-weight:600;}
.chiprow{display:flex;gap:8px;overflow-x:auto;padding:8px 18px 4px;scrollbar-width:none;}
.chiprow::-webkit-scrollbar{display:none;}
.chip{flex:none;white-space:nowrap;font-size:13px;padding:7px 13px;border-radius:20px;border:1px solid var(--strong);background:var(--surface);color:var(--muted);cursor:pointer;}
.chip i{vertical-align:-1px;margin-right:3px;}
.c-appel{background:var(--blue-bg);color:var(--blue-tx);border-color:transparent;}
.c-achat{background:var(--amber-bg);color:var(--amber-tx);border-color:transparent;}
.c-action{background:var(--card);color:var(--muted);border-color:transparent;}
.c-recherche{background:var(--teal-bg);color:var(--teal-tx);border-color:transparent;}
.chip.on{outline:2.5px solid currentColor;outline-offset:1px;font-weight:600;}
.alt.on{background:var(--text);color:var(--surface);border-color:var(--text);outline:none;}
main{flex:1;overflow-y:auto;padding:6px 12px 12px;}
.grouphdr{margin:16px 8px 4px;font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--faint);}
.task{display:flex;align-items:flex-start;gap:11px;padding:11px 8px;border-radius:12px;}
.task:active{background:var(--card);}
.check{flex:none;margin-top:4px;width:22px;height:22px;border-radius:50%;border:1.5px solid var(--strong);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.check.done{background:var(--done);border-color:var(--done);}
.check.done::after{content:"\2713";color:#fff;font-size:13px;line-height:1;}
.tile{flex:none;width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;}
.t-appel .tile{background:var(--blue-bg);color:var(--blue-tx);}
.t-achat .tile{background:var(--amber-bg);color:var(--amber-tx);}
.t-recherche .tile{background:var(--teal-bg);color:var(--teal-tx);}
.t-action .tile{background:var(--card);color:var(--muted);}
.t-pense .tile{background:var(--purple-bg);color:var(--purple-tx);}
.body{flex:1;min-width:0;}
.ttl{display:block;font-size:16px;line-height:1.35;}
.task.done .ttl{text-decoration:line-through;color:var(--faint);}
.meta{display:inline-flex;align-items:center;gap:7px;margin-top:4px;flex-wrap:wrap;}
.tag{font-size:11px;padding:1px 8px;border-radius:20px;}
.tag.appel{background:var(--blue-bg);color:var(--blue-tx);}
.tag.achat{background:var(--amber-bg);color:var(--amber-tx);}
.tag.recherche{background:var(--teal-bg);color:var(--teal-tx);}
.tag.action{background:var(--card);color:var(--muted);}
.tag.pense{background:var(--purple-bg);color:var(--purple-tx);}
.src{font-size:12px;color:var(--muted);}
.src i{vertical-align:-1px;}
.del{flex:none;margin-top:6px;color:var(--faint);font-size:17px;opacity:.5;cursor:pointer;padding:0 2px;}
.empty{text-align:center;color:var(--faint);font-size:14px;padding:36px 10px;}
.revcard{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 14px;margin:10px 6px;}
.revcard h3{margin:0 0 8px;font-size:14px;font-weight:600;display:flex;align-items:center;gap:7px;}
.revcard .big{font-size:26px;font-weight:600;}
.rituel label{display:flex;align-items:center;gap:9px;padding:6px 0;font-size:15px;cursor:pointer;}
.rituel input{width:20px;height:20px;}
.capture{display:flex;gap:9px;align-items:center;padding:10px 14px;border-top:1px solid var(--border);background:var(--surface);}
.capture input{flex:1;height:42px;border:1px solid var(--strong);border-radius:12px;padding:0 13px;font-size:15px;background:var(--bg);color:var(--text);}
.capture input:focus{outline:none;border-color:var(--purple-tx);}
.addbtn{flex:none;width:42px;height:42px;border-radius:50%;border:none;background:var(--purple-tx);color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
nav{display:flex;border-top:1px solid var(--border);background:var(--surface);padding-bottom:env(safe-area-inset-bottom);}
.navbtn{flex:1;text-align:center;padding:9px 0 12px;color:var(--faint);cursor:pointer;border:none;background:none;font-size:10px;}
.navbtn i{display:block;font-size:21px;margin-bottom:2px;}
.navbtn.on{color:var(--blue-tx);}
.ver{text-align:center;font-size:10px;color:var(--faint);padding:2px 0 6px;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-end;z-index:50;}
.overlay.show{display:flex;}
.sheet{width:100%;max-width:480px;margin:0 auto;background:var(--surface);border-radius:18px 18px 0 0;padding:18px 18px calc(18px + env(safe-area-inset-bottom));}
.sheet h2{margin:0 0 12px;font-size:18px;font-weight:600;}
.sheet textarea{width:100%;min-height:72px;border:1px solid var(--strong);border-radius:12px;padding:11px;font-size:16px;background:var(--bg);color:var(--text);font-family:inherit;resize:none;}
.typesel{display:flex;gap:8px;margin:12px 0;}
.typesel button{flex:1;padding:9px 0;border-radius:10px;border:1px solid var(--strong);background:var(--surface);color:var(--muted);font-size:14px;cursor:pointer;}
.typesel button.on{background:var(--blue-bg);color:var(--blue-tx);border-color:transparent;font-weight:600;}
.sheetrow{display:flex;gap:9px;}
.voicebtn{flex:none;width:54px;border-radius:12px;border:1px solid var(--strong);background:var(--surface);color:var(--blue-tx);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.voicebtn.rec{background:var(--blue-tx);color:#fff;border-color:var(--blue-tx);}
.sheetadd{width:100%;margin-top:12px;padding:13px 0;border-radius:12px;border:none;background:var(--blue-tx);color:#fff;font-size:16px;font-weight:600;cursor:pointer;}
.hint{font-size:12px;color:var(--faint);margin-top:8px;min-height:16px;}
.seclbl{font-size:12px;color:var(--faint);text-transform:uppercase;letter-spacing:.04em;margin:14px 0 6px;}
.sheet input{width:100%;height:42px;border:1px solid var(--strong);border-radius:12px;padding:0 12px;font-size:16px;background:var(--bg);color:var(--text);font-family:inherit;}
.typesel.ctx{flex-wrap:wrap;margin:6px 0 0;}
.typesel.ctx button{flex:1 1 28%;}
.sheetdel{width:100%;margin-top:10px;padding:11px 0;border-radius:12px;border:1px solid var(--strong);background:var(--surface);color:#a32d2d;font-size:15px;cursor:pointer;}
.datechip{font-size:11px;padding:1px 8px;border-radius:20px;background:var(--card);color:var(--muted);}
.datechip.overdue{background:var(--red-bg);color:var(--red-tx);font-weight:600;}
.datechip.todaychip{background:var(--blue-bg);color:var(--blue-tx);font-weight:600;}
.projchips{display:flex;flex-wrap:wrap;gap:7px;}
.projchips button{font-size:13px;padding:7px 12px;border-radius:20px;border:1px solid var(--strong);background:var(--surface);color:var(--muted);cursor:pointer;}
.projchips button.on{background:var(--text);color:var(--surface);border-color:var(--text);font-weight:600;}
.cal{border:1px solid var(--border);border-radius:12px;padding:10px;}
.calhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.calhead span{font-size:15px;font-weight:600;text-transform:capitalize;}
.calhead button{width:34px;height:34px;border-radius:8px;border:1px solid var(--strong);background:var(--surface);color:var(--text);cursor:pointer;font-size:16px;}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.calgrid .wd{font-size:11px;color:var(--faint);text-align:center;padding:3px 0;}
.calgrid .day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:14px;border-radius:8px;cursor:pointer;}
.calgrid .day:active{background:var(--card);}
.calgrid .day.today{outline:1.5px solid var(--blue-tx);}
.calgrid .day.sel{background:var(--blue-tx);color:#fff;font-weight:600;}
.calquick{display:flex;gap:6px;margin-top:9px;}
.calquick button{flex:1;font-size:12px;padding:7px 2px;border-radius:8px;border:1px solid var(--strong);background:var(--surface);color:var(--muted);cursor:pointer;}
</style>
</head>
<body>

<header>
  <button class="addtop" id="quickadd" aria-label="Ajout rapide"><i class="ti ti-plus"></i></button>
  <h1 id="vtitle">Aujourd'hui</h1>
  <p class="count"><span id="vcount"></span><span class="reset" id="reset" style="display:none">effacer</span></p>
</header>

<div class="spherebar" id="spherebar">
  <button class="sphere on" data-s="tout">Tout</button>
  <button class="sphere" data-s="pro">Pro</button>
  <button class="sphere" data-s="perso">Perso</button>
</div>

<div class="chiprow" id="typechips">
  <button class="chip c-appel" data-g="type" data-f="appel"><i class="ti ti-phone"></i>Appels</button>
  <button class="chip c-achat" data-g="type" data-f="achat"><i class="ti ti-shopping-cart"></i>Achats</button>
  <button class="chip c-action" data-g="type" data-f="action"><i class="ti ti-bolt"></i>Actions</button>
  <button class="chip c-recherche" data-g="type" data-f="recherche"><i class="ti ti-search"></i>Recherches</button>
</div>
<div class="chiprow" id="projchips"></div>

<main id="list"></main>

<div class="capture" id="capbar">
  <input id="cap" type="text" placeholder="Vide-tête : note une idée…" autocomplete="off">
  <button class="addbtn" id="add" aria-label="Ajouter"><i class="ti ti-plus"></i></button>
</div>

<div class="ver">Cockpit v1.5</div>

<nav>
  <button class="navbtn on" data-tab="today"><i class="ti ti-sun"></i>Aujourd'hui</button>
  <button class="navbtn" data-tab="proj"><i class="ti ti-folders"></i>Projets</button>
  <button class="navbtn" data-tab="pense"><i class="ti ti-bulb"></i>Pense-bête</button>
  <button class="navbtn" data-tab="revue"><i class="ti ti-calendar-check"></i>Revue</button>
</nav>

<div class="overlay" id="overlay">
  <div class="sheet">
    <h2>Ajout rapide</h2>
    <div class="sheetrow">
      <textarea id="qtext" placeholder="Écris, ou dicte avec Wispr Flow…"></textarea>
      <button class="voicebtn" id="voice" aria-label="Dicter"><i class="ti ti-microphone"></i></button>
    </div>
    <div class="hint" id="qhint"></div>
    <div class="typesel" id="qtype">
      <button data-t="action" class="on">Tâche</button>
      <button data-t="pense">Pense-bête</button>
    </div>
    <button class="sheetadd" id="qsubmit">Ajouter</button>
  </div>
</div>

<div class="overlay" id="editov">
  <div class="sheet">
    <h2>Modifier la tâche</h2>
    <textarea id="etext"></textarea>
    <p class="seclbl">Contexte</p>
    <div class="typesel ctx" id="ectx">
      <button data-t="appel">Appel</button>
      <button data-t="achat">Achat</button>
      <button data-t="action">Action</button>
      <button data-t="recherche">Recherche</button>
    </div>
    <p class="seclbl">Projet</p>
    <div class="projchips" id="eprojchips"></div>
    <input id="eproj" placeholder="Autre projet…" autocomplete="off" style="margin-top:8px">
    <p class="seclbl">Sphère</p>
    <div class="typesel" id="esphere">
      <button data-s="perso">Perso</button>
      <button data-s="pro">Pro</button>
    </div>
    <p class="seclbl">Date</p>
    <div class="cal">
      <div class="calhead">
        <button type="button" id="calprev" aria-label="Mois précédent"><i class="ti ti-chevron-left"></i></button>
        <span id="calmonth"></span>
        <button type="button" id="calnext" aria-label="Mois suivant"><i class="ti ti-chevron-right"></i></button>
      </div>
      <div class="calgrid" id="calgrid"></div>
      <div class="calquick">
        <button type="button" data-q="today">Aujourd'hui</button>
        <button type="button" data-q="tom">Demain</button>
        <button type="button" data-q="week">+1 sem</button>
        <button type="button" data-q="none">Aucune</button>
      </div>
    </div>
    <button class="sheetadd" id="esave">Enregistrer</button>
    <button class="sheetdel" id="edel">Supprimer la tâche</button>
  </div>
</div>

<script>
(function(){
  var APP="v1.5", KEY="cockpit.items.v3";
  var SEED=[
    {t:"Valider le montage juridique",type:"action",proj:"Madrigal",sphere:"pro"},
    {t:"Préparer l'ordre du jour du COPIL",type:"action",proj:"Sentinel",sphere:"pro"},
    {t:"Lancer l'audit des performances",type:"action",proj:"Belmondo",sphere:"pro"},
    {t:"Appeler le notaire",type:"appel",proj:"Madrigal",sphere:"pro"},
    {t:"Rappeler Jeanne — finance",type:"appel",proj:"Belmondo",sphere:"pro"},
    {t:"Rappeler Lionel — ophtalmo",type:"appel",proj:"Madrigal",sphere:"pro"},
    {t:"Avancer le plan de redressement",type:"action",proj:"Mont-de-Marsan",sphere:"pro"},
    {t:"Étudier le modèle Tesla distributeurs",type:"recherche",proj:"Belmondo",sphere:"pro"},
    {t:"Appeler le carrossier",type:"appel",proj:"Datsun",sphere:"perso"},
    {t:"Vis inox + joints",type:"achat",proj:"Datsun",sphere:"perso"},
    {t:"Carrelage salle de bain",type:"achat",proj:"Benquet",sphere:"perso"},
    {t:"Barre de son chambre",type:"achat",proj:"Seignosse",sphere:"perso"},
    {t:"Commander les filtres à huile",type:"achat",proj:"Sprinter",sphere:"perso"},
    {t:"Refaire les chapitres",type:"action",proj:"Livre",sphere:"perso"},
    {t:"Programmer le bilan sanguin",type:"action",proj:"Corps qui vieillit bien",sphere:"perso"},
    {t:"Lire sur les agents IA Claude",type:"recherche",proj:"Agents IA",sphere:"perso"},
    {t:"20 min de sim racing ce soir",type:"action",proj:"Sim Racing",sphere:"perso"},
    {t:"Newsletter interne mensuelle ?",type:"pense",proj:"",sphere:"pro"},
    {t:"Tesla distrib = même modèle que Madrigal ?",type:"pense",proj:"",sphere:"pro"},
    {t:"Idée chapitre : se radicaliser avec l'âge ?",type:"pense",proj:"",sphere:"perso"},
    {t:"Lire le bouquin cité par Xavier",type:"pense",proj:"",sphere:"perso"}
  ];
  var DONE_SEED=[
    {t:"Signer la note de frais Sprinter",type:"action",proj:"Sprinter",sphere:"perso"},
    {t:"Valider le devis ophtalmo",type:"action",proj:"Madrigal",sphere:"pro"},
    {t:"Appeler le comptable",type:"appel",proj:"Finance",sphere:"pro"}
  ];

  var items=load();
  var tab="today", sphere="tout", typeSel={}, projSel={};

  function load(){
    try{var s=localStorage.getItem(KEY);if(s)return JSON.parse(s);}catch(e){}
    var arr=[],i=0;
    SEED.forEach(function(x){arr.push({id:Date.now()+(i++),t:x.t,type:x.type,proj:x.proj,sphere:x.sphere,done:false,week:false});});
    DONE_SEED.forEach(function(x){arr.push({id:Date.now()+(i++),t:x.t,type:x.type,proj:x.proj,sphere:x.sphere,done:true,week:true});});
    save(arr);return arr;
  }
  function save(arr){try{localStorage.setItem(KEY,JSON.stringify(arr||items));}catch(e){}}

  var ICON={appel:"ti-phone",achat:"ti-shopping-cart",recherche:"ti-search",action:"ti-bolt",pense:"ti-bulb"};
  var LABEL={appel:"appel",achat:"achat",recherche:"recherche",action:"action",pense:"pense-bête"};
  var TITLES={today:"Aujourd'hui",proj:"Projets",pense:"Pense-bête",revue:"Revue hebdo"};
  function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;");}
  function fmtDate(d){if(!d)return"";var p=d.split("-");return p.length===3?p[2]+"/"+p[1]:d;}
  function escapeRe(s){return s.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");}
  function projNames(){var seen={},a=[];items.forEach(function(it){if(it.proj&&!seen[it.proj]){seen[it.proj]=1;a.push(it.proj);}});return a;}
  function parseSmart(text){
    var t=text,type="action",date="",proj="";
    if(/\b(appeler|t[ée]l[ée]phoner|rappeler|appel|coup de fil)\b/i.test(t))type="appel";
    else if(/\b(acheter|commander|achat|achats|course|courses)\b/i.test(t))type="achat";
    else if(/\b(chercher|rechercher|[ée]tudier|lire|regarder|comparer|analyser|recherche)\b/i.test(t))type="recherche";
    var pn=projNames();
    for(var i=0;i<pn.length;i++){if(new RegExp("\\b"+escapeRe(pn[i])+"\\b","i").test(t)){proj=pn[i];break;}}
    function set(off){var x=new Date();x.setDate(x.getDate()+off);return x;}
    var found=null,m;
    if(/apr[èe]s-?demain/i.test(t)){found=set(2);t=t.replace(/\bapr[èe]s-?demain\b/i,"");}
    else if(/\bdemain\b/i.test(t)){found=set(1);t=t.replace(/\bdemain\b/i,"");}
    else if(/aujourd'?hui|ce soir|ce midi/i.test(t)){found=set(0);t=t.replace(/\b(aujourd'?hui|ce soir|ce midi)\b/i,"");}
    else if(/semaine prochaine/i.test(t)){found=set(7);t=t.replace(/\b(la\s+)?semaine prochaine\b/i,"");}
    else if(m=t.match(/dans (\d+) jours?/i)){found=set(parseInt(m[1],10));t=t.replace(m[0],"");}
    else{var days=["dimanche","lundi","mardi","mercredi","jeudi","vendredi","samedi"];
      for(var j=0;j<7;j++){if(new RegExp("\\b"+days[j]+"\\b","i").test(t)){var off=(j-new Date().getDay()+7)%7;if(off===0)off=7;found=set(off);t=t.replace(new RegExp("\\b(ce\\s+|le\\s+)?"+days[j]+"\\b","i"),"");break;}}}
    if(found)date=found.getFullYear()+"-"+pad2(found.getMonth()+1)+"-"+pad2(found.getDate());
    t=t.replace(/\s{2,}/g," ").trim();
    return {title:t||text,type:type,date:date,proj:proj};
  }
  function keys(o){var a=[];for(var k in o)if(o[k])a.push(k);return a;}

  function inSphere(it){return sphere==="tout"||it.sphere===sphere;}

  function buildProjChips(){
    var seen={},names=[];
    items.forEach(function(it){if(it.proj&&inSphere(it)&&!seen[it.proj]){seen[it.proj]=1;names.push(it.proj);}});
    var c=document.getElementById("projchips");c.innerHTML="";
    names.forEach(function(n){
      var b=document.createElement("button");b.className="chip alt";b.setAttribute("data-f",n);
      b.textContent=n;if(projSel[n])b.classList.add("on");
      b.addEventListener("click",function(){projSel[n]=!projSel[n];b.classList.toggle("on",!!projSel[n]);render();});
      c.appendChild(b);
    });
  }

  function passFilter(it){
    var ts=keys(typeSel),ps=keys(projSel);
    var okT=ts.length===0||ts.indexOf(it.type)>-1;
    var okP=ps.length===0||ps.indexOf(it.proj)>-1;
    return okT&&okP&&inSphere(it);
  }

  function mkRow(it){
    var d=document.createElement("div");d.className="task t-"+it.type+(it.done?" done":"");
    var icon=ICON[it.type]||"ti-circle";
    var tag=LABEL[it.type]?'<span class="tag '+it.type+'">'+LABEL[it.type]+'</span>':'';
    var src=it.proj?'<span class="src"><i class="ti ti-folder"></i> '+esc(it.proj)+'</span>':'';
    var dch="";
    if(it.date){var dc="datechip",dl=fmtDate(it.date);
      if(!it.done&&it.date<todayStr()){dc+=" overdue";}
      else if(it.date===todayStr()){dc+=" todaychip";dl="aujourd'hui";}
      dch='<span class="'+dc+'"><i class="ti ti-calendar"></i> '+dl+'</span>';}
    d.innerHTML='<span class="check'+(it.done?" done":"")+'"></span><span class="tile"><i class="ti '+icon+'"></i></span>'+
      '<span class="body"><span class="ttl">'+esc(it.t)+'</span><span class="meta">'+tag+src+dch+'</span></span>'+
      '<span class="del"><i class="ti ti-x"></i></span>';
    d.querySelector(".check").addEventListener("click",function(e){e.stopPropagation();it.done=!it.done;if(it.done)it.week=true;save();render();});
    d.querySelector(".body").addEventListener("click",function(){openEdit(it);});
    d.querySelector(".del").addEventListener("click",function(e){e.stopPropagation();items=items.filter(function(x){return x.id!==it.id;});save();buildProjChips();render();});
    return d;
  }

  function showChips(on){
    document.getElementById("typechips").style.display=on?"flex":"none";
    document.getElementById("projchips").style.display=on?"flex":"none";
  }

  function render(){
    var L=document.getElementById("list");L.innerHTML="";var n=0;
    showChips(tab==="today"||tab==="proj");
    document.getElementById("capbar").style.display=(tab==="revue")?"none":"flex";

    if(tab==="today"){
      items.filter(function(it){return it.type!=="pense"&&passFilter(it);})
        .sort(function(a,b){var dd=(a.done?1:0)-(b.done?1:0);if(dd)return dd;
          var av=a.date||"9999-99-99",bv=b.date||"9999-99-99";return av<bv?-1:(av>bv?1:0);})
        .forEach(function(it){L.appendChild(mkRow(it));n++;});
    } else if(tab==="pense"){
      items.filter(function(it){return it.type==="pense"&&inSphere(it);})
        .forEach(function(it){L.appendChild(mkRow(it));n++;});
    } else if(tab==="proj"){
      var groups={},order=[];
      items.filter(function(it){return it.proj&&passFilter(it);}).forEach(function(it){
        if(!groups[it.proj]){groups[it.proj]=[];order.push(it.proj);}groups[it.proj].push(it);
      });
      order.forEach(function(g){
        var h=document.createElement("p");h.className="grouphdr";h.textContent=g;L.appendChild(h);
        groups[g].sort(function(a,b){return (a.done?1:0)-(b.done?1:0);});
        groups[g].forEach(function(it){L.appendChild(mkRow(it));n++;});
      });
    } else if(tab==="revue"){
      renderRevue(L);n=-1;
    }
    if(n===0){var e=document.createElement("p");e.className="empty";e.textContent="Rien dans cette vue.";L.appendChild(e);}

    var active=keys(typeSel).length+keys(projSel).length;
    document.getElementById("vtitle").textContent=(tab==="today"&&active)?"Vue filtrée":TITLES[tab];
    if(tab==="revue"){document.getElementById("vcount").textContent="";}
    else{document.getElementById("vcount").textContent=(n<0?0:n)+((n>1)?" éléments":" élément");}
    document.getElementById("reset").style.display=(active&&(tab==="today"||tab==="proj"))?"inline":"none";
  }

  function card(title,iconName){
    var c=document.createElement("div");c.className="revcard";
    c.innerHTML='<h3><i class="ti '+iconName+'"></i> '+title+'</h3>';
    return c;
  }
  function renderRevue(L){
    var pool=items.filter(inSphere);
    var done=pool.filter(function(it){return it.done&&it.week;});
    var nexts=pool.filter(function(it){return it.proj&&!it.done&&it.type!=="pense";});
    var penses=pool.filter(function(it){return it.type==="pense";});
    var probs=pool.filter(function(it){return ["Deep work dirigeant","Corps qui vieillit bien","Agents IA","Sim Racing","Mont-de-Marsan"].indexOf(it.proj)>-1&&!it.done;});

    var c1=card("Fait cette semaine","ti-circle-check");
    c1.innerHTML+='<div class="big" style="color:var(--done)">'+done.length+'</div>';
    done.slice(0,6).forEach(function(it){c1.innerHTML+='<div class="src" style="margin-top:4px"><i class="ti ti-check"></i> '+esc(it.t)+'</div>';});
    L.appendChild(c1);

    var c2=card("À trier (pense-bête)","ti-bulb");
    c2.innerHTML+='<div class="big" style="color:var(--purple-tx)">'+penses.length+'</div><div class="src">à transformer en action ou à jeter</div>';
    L.appendChild(c2);

    var c3=card("Actions projet en cours","ti-arrow-big-right-lines");
    if(nexts.length){nexts.forEach(function(it){c3.innerHTML+='<div class="src" style="margin-top:5px"><i class="ti ti-folder"></i> '+esc(it.proj)+' — '+esc(it.t)+'</div>';});}
    else{c3.innerHTML+='<div class="src">Aucune action ouverte rattachée à un projet.</div>';}
    L.appendChild(c3);

    var c4=card("Problématiques à nourrir","ti-flame");
    if(probs.length){probs.forEach(function(it){c4.innerHTML+='<div class="src" style="margin-top:5px">'+esc(it.proj)+' — '+esc(it.t)+'</div>';});}
    else{c4.innerHTML+='<div class="src">Rien d\'ouvert sur tes sujets de fond.</div>';}
    L.appendChild(c4);

    var c5=card("Rituel de la revue","ti-checklist");
    c5.innerHTML+='<div class="rituel">'+
      '<label><input type="checkbox"> Vider le pense-bête</label>'+
      '<label><input type="checkbox"> Revoir chaque projet</label>'+
      '<label><input type="checkbox"> Définir le prochain next step</label>'+
      '<label><input type="checkbox"> Célébrer une victoire de la semaine</label></div>';
    L.appendChild(c5);
  }

  document.querySelectorAll("#typechips .chip").forEach(function(c){
    c.addEventListener("click",function(){var f=c.getAttribute("data-f");typeSel[f]=!typeSel[f];c.classList.toggle("on",!!typeSel[f]);render();});
  });
  document.querySelectorAll("#spherebar .sphere").forEach(function(b){
    b.addEventListener("click",function(){
      sphere=b.getAttribute("data-s");
      document.querySelectorAll("#spherebar .sphere").forEach(function(x){x.classList.toggle("on",x===b);});
      projSel={};buildProjChips();render();
    });
  });
  document.querySelectorAll(".navbtn").forEach(function(b){
    b.addEventListener("click",function(){
      tab=b.getAttribute("data-tab");
      document.querySelectorAll(".navbtn").forEach(function(x){x.classList.toggle("on",x===b);});
      render();
    });
  });
  document.getElementById("reset").addEventListener("click",function(){
    typeSel={};projSel={};document.querySelectorAll(".chip.on").forEach(function(x){x.classList.remove("on");});render();
  });

  function quickAddPense(){
    var inp=document.getElementById("cap");var v=inp.value.trim();if(!v)return;
    items.unshift({id:Date.now(),t:v,type:"pense",proj:"",sphere:(sphere==="pro"?"pro":"perso"),done:false,week:false});
    save();inp.value="";tab="pense";
    document.querySelectorAll(".navbtn").forEach(function(x){x.classList.toggle("on",x.getAttribute("data-tab")==="pense");});
    render();
  }
  document.getElementById("add").addEventListener("click",quickAddPense);
  document.getElementById("cap").addEventListener("keydown",function(e){if(e.key==="Enter")quickAddPense();});

  var qType="action";
  var ov=document.getElementById("overlay"),qtext=document.getElementById("qtext"),qhint=document.getElementById("qhint");
  document.getElementById("quickadd").addEventListener("click",function(){ov.classList.add("show");qhint.textContent="";setTimeout(function(){qtext.focus();},150);});
  ov.addEventListener("click",function(e){if(e.target===ov)ov.classList.remove("show");});
  document.querySelectorAll("#qtype button").forEach(function(b){
    b.addEventListener("click",function(){qType=b.getAttribute("data-t");document.querySelectorAll("#qtype button").forEach(function(x){x.classList.toggle("on",x===b);});});
  });
  document.getElementById("qsubmit").addEventListener("click",function(){
    var v=qtext.value.trim();if(!v){ov.classList.remove("show");return;}
    if(qType==="pense"){
      items.unshift({id:Date.now(),t:v,type:"pense",proj:"",sphere:(sphere==="pro"?"pro":"perso"),date:"",done:false,week:false});
    }else{
      var p=parseSmart(v);
      items.unshift({id:Date.now(),t:p.title,type:p.type,proj:p.proj,sphere:(sphere==="pro"?"pro":"perso"),date:p.date,done:false,week:false});
    }
    save();qtext.value="";ov.classList.remove("show");
    tab=(qType==="pense")?"pense":"today";
    document.querySelectorAll(".navbtn").forEach(function(x){x.classList.toggle("on",x.getAttribute("data-tab")===tab);});
    buildProjChips();render();
  });

  var rec=null;
  document.getElementById("voice").addEventListener("click",function(){
    var btn=this;var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){qtext.focus();qhint.textContent="Dicte avec Wispr Flow : ta voix s'écrit directement dans le champ.";return;}
    if(rec){rec.stop();return;}
    rec=new SR();rec.lang="fr-FR";rec.interimResults=false;rec.continuous=false;
    btn.classList.add("rec");qhint.textContent="Parle… (touche à nouveau pour arrêter)";
    rec.onresult=function(e){var t="";for(var i=0;i<e.results.length;i++)t+=e.results[i][0].transcript;qtext.value=(qtext.value?qtext.value+" ":"")+t;};
    rec.onend=function(){btn.classList.remove("rec");qhint.textContent="";rec=null;};
    rec.onerror=function(){btn.classList.remove("rec");qhint.textContent="Micro indisponible — utilise le clavier.";rec=null;};
    rec.start();
  });

  var editov=document.getElementById("editov"),etext=document.getElementById("etext"),eproj=document.getElementById("eproj");
  var ectxSel="action",esphSel="perso",editing=null;
  var eselDate="",calY=new Date().getFullYear(),calM=new Date().getMonth();
  var MONTHS=["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];
  var WD=["L","M","M","J","V","S","D"];
  function pad2(n){return (n<10?"0":"")+n;}
  function todayStr(){var d=new Date();return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate());}
  function renderCal(){
    var g=document.getElementById("calgrid");if(!g)return;g.innerHTML="";
    document.getElementById("calmonth").textContent=MONTHS[calM]+" "+calY;
    WD.forEach(function(w){var e=document.createElement("div");e.className="wd";e.textContent=w;g.appendChild(e);});
    var startDow=(new Date(calY,calM,1).getDay()+6)%7;
    var daysIn=new Date(calY,calM+1,0).getDate();
    for(var i=0;i<startDow;i++){g.appendChild(document.createElement("div"));}
    var tstr=todayStr();
    for(var d=1;d<=daysIn;d++){
      var ds=calY+"-"+pad2(calM+1)+"-"+pad2(d);
      var cell=document.createElement("div");cell.className="day";cell.textContent=d;
      if(ds===tstr)cell.classList.add("today");
      if(ds===eselDate)cell.classList.add("sel");
      (function(x){cell.addEventListener("click",function(){eselDate=x;renderCal();});})(ds);
      g.appendChild(cell);
    }
  }
  document.getElementById("calprev").addEventListener("click",function(){calM--;if(calM<0){calM=11;calY--;}renderCal();});
  document.getElementById("calnext").addEventListener("click",function(){calM++;if(calM>11){calM=0;calY++;}renderCal();});
  document.querySelectorAll(".calquick button").forEach(function(b){
    b.addEventListener("click",function(){
      var q=b.getAttribute("data-q"),d=new Date();
      if(q==="tom")d.setDate(d.getDate()+1);
      else if(q==="week")d.setDate(d.getDate()+7);
      else if(q==="none"){eselDate="";renderCal();return;}
      eselDate=d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate());
      calY=d.getFullYear();calM=d.getMonth();renderCal();
    });
  });
  function fillProjChips(current){
    var seen={},names=[];items.forEach(function(it){if(it.proj&&!seen[it.proj]){seen[it.proj]=1;names.push(it.proj);}});
    var c=document.getElementById("eprojchips");c.innerHTML="";
    names.forEach(function(n){
      var b=document.createElement("button");b.textContent=n;if(n===current)b.classList.add("on");
      b.addEventListener("click",function(){
        eproj.value=n;
        document.querySelectorAll("#eprojchips button").forEach(function(x){x.classList.toggle("on",x===b);});
      });
      c.appendChild(b);
    });
  }
  function openEdit(it){
    editing=it;etext.value=it.t;eproj.value=it.proj||"";
    eselDate=it.date||"";
    if(eselDate){var p=eselDate.split("-");calY=parseInt(p[0],10);calM=parseInt(p[1],10)-1;}
    else{var nd=new Date();calY=nd.getFullYear();calM=nd.getMonth();}
    renderCal();
    ectxSel=(it.type==="pense"?"action":it.type);esphSel=it.sphere||"perso";
    document.querySelectorAll("#ectx button").forEach(function(b){b.classList.toggle("on",b.getAttribute("data-t")===ectxSel);});
    document.querySelectorAll("#esphere button").forEach(function(b){b.classList.toggle("on",b.getAttribute("data-s")===esphSel);});
    fillProjChips(it.proj||"");editov.classList.add("show");
  }
  window.openEdit=openEdit;
  document.querySelectorAll("#ectx button").forEach(function(b){
    b.addEventListener("click",function(){ectxSel=b.getAttribute("data-t");document.querySelectorAll("#ectx button").forEach(function(x){x.classList.toggle("on",x===b);});});
  });
  document.querySelectorAll("#esphere button").forEach(function(b){
    b.addEventListener("click",function(){esphSel=b.getAttribute("data-s");document.querySelectorAll("#esphere button").forEach(function(x){x.classList.toggle("on",x===b);});});
  });
  editov.addEventListener("click",function(e){if(e.target===editov)editov.classList.remove("show");});
  document.getElementById("esave").addEventListener("click",function(){
    if(!editing)return;
    editing.t=etext.value.trim()||editing.t;editing.type=ectxSel;editing.proj=eproj.value.trim();
    editing.sphere=esphSel;editing.date=eselDate;
    save();editov.classList.remove("show");buildProjChips();render();
  });
  document.getElementById("edel").addEventListener("click",function(){
    if(!editing)return;items=items.filter(function(x){return x.id!==editing.id;});
    save();editov.classList.remove("show");buildProjChips();render();
  });

  buildProjChips();
  render();
})();
</script>
</body>
</html>
